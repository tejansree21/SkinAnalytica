services:

  - type: web
    name: skinanalytica-api
    runtime: python
    buildCommand: |
      pip install requests httpx
      pip install -r requirements.txt
      python startup.py
    startCommand: uvicorn SA05_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SKINANALYTICA_MODEL_MODE
        value: efficientnet
      - key: SKINANALYTICA_BASE
        value: /opt/render/project/src
      - key: MODEL_DIR
        value: /opt/render/project/src/models/production/onnx
      - key: HF_MODEL_REPO
        value: tejansree/skinanalytica-models
      - key: SKINANALYTICA_FRONTEND_URL
        value: https://skinanalytica.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health

  - type: web
    name: skinanalytica-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd assistant && uvicorn assistant_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SKINANALYTICA_BASE
        value: /opt/render/project/src
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: skinanalytica-delivery
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd delivery && uvicorn delivery_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SKINANALYTICA_BASE
        value: /opt/render/project/src
