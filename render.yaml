services:

  - type: web
    name: skinanalytica-api
    runtime: python
    buildCommand: |
      pip install requests httpx
      pip install "fastapi==0.115.0" "uvicorn[standard]==0.30.6" "python-multipart==0.0.9" "pydantic==2.7.4" "onnxruntime>=1.18.0" "numpy>=1.26.0" "opencv-python-headless>=4.10.0" "Pillow>=10.4.0" "scikit-learn>=1.5.0" "pandas>=2.2.0" "reportlab>=4.2.0" "anthropic>=0.34.0" "python-dotenv>=1.0.0" "scipy>=1.13.0"
      python startup.py
    startCommand: cd api && python -m uvicorn SA05_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: SKINANALYTICA_MODEL_MODE
        value: efficientnet
      - key: SKINANALYTICA_BASE
        value: /opt/render/project/src
      - key: MODEL_DIR
        value: /opt/render/project/src/models/production/onnx
      - key: HF_MODEL_REPO
        value: tejansree/skinanalytica-models
      - key: SKINANALYTICA_FRONTEND_URL
        value: https://skin-analytica.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health

  - type: web
    name: skinanalytica-assistant
    runtime: python
    buildCommand: pip install "fastapi==0.115.0" "uvicorn[standard]==0.30.6" "pydantic==2.7.4" "anthropic>=0.34.0" "python-dotenv>=1.0.0" "requests>=2.32.0"
    startCommand: cd assistant && python -m uvicorn assistant_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: SKINANALYTICA_BASE
        value: /opt/render/project/src
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: skinanalytica-delivery
    runtime: python
    buildCommand: pip install "fastapi==0.115.0" "uvicorn[standard]==0.30.6" "pydantic==2.7.4" "reportlab>=4.2.0" "requests>=2.32.0"
    startCommand: cd delivery && python -m uvicorn delivery_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: SKINANALYTICA_BASE
        value: /opt/render/project/src
