<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinAnalytica</title>
<script src="env_config.js"></script>
<style>
  :root {
    --bg:      #080808;
    --surface: #111111;
    --surface2:#1a1a1a;
    --border:  #2a2a2a;
    --border2: #333333;
    --red:     #dc2626;
    --red2:    #ef4444;
    --red3:    #fca5a5;
    --green2:  #4ade80;
    --amber2:  #fbbf24;
    --text:    #f5f5f5;
    --muted:   #525252;
    --subtle:  #a3a3a3;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Nav ──────────────────────────────────────────── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 200;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 1.05rem;
    font-weight: 700;
    text-decoration: none;
    color: var(--text);
    cursor: pointer;
  }

  .logo-icon {
    width: 30px; height: 30px;
    background: var(--red);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    box-shadow: 0 0 12px rgba(220,38,38,0.4);
  }

  .logo span { color: var(--red2); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    transition: all 0.15s;
    cursor: pointer;
    white-space: nowrap;
  }

  .nav-links a:hover { color: var(--text); background: var(--surface); }
  .nav-links a.active { color: var(--text); background: var(--surface2); border: 1px solid var(--border2); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .api-dot {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--subtle);
    border: 1px solid var(--border2);
    padding: 0.22rem 0.65rem;
    border-radius: 20px;
  }

  .api-dot .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
  }

  .api-dot.live .dot {
    background: var(--green2);
    box-shadow: 0 0 5px var(--green2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .nav-badge {
    background: var(--red);
    color: white;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    letter-spacing: 0.4px;
  }

  /* ── Page frame ──────────────────────────────────── */
  #page-frame {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
    min-height: calc(100vh - 57px);
  }

  /* ── Loading bar ─────────────────────────────────── */
  #loading-bar {
    position: fixed;
    top: 56px;
    left: 0;
    height: 2px;
    width: 0%;
    background: var(--red);
    z-index: 300;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--red);
  }

  /* ── Toast ───────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid rgba(220,38,38,0.35);
    border-radius: 9px;
    padding: 0.85rem 1.1rem;
    font-size: 0.8rem;
    max-width: 300px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  .toast-title { font-weight: 700; color: var(--red2); margin-bottom: 0.2rem; font-size:0.78rem; }

  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .nav-badge { display: none; }
  }
</style>
</head>
<body>

<div id="loading-bar"></div>

<nav>
  <div class="logo" onclick="navigate('home')">
    <div class="logo-icon">🔬</div>
    Skin<span>Analytica</span>
  </div>

  <ul class="nav-links">
    <li><a id="nav-home"      onclick="navigate('home')"      class="active">Home</a></li>
    <li><a id="nav-analyze"   onclick="navigate('analyze')"  >Analyze</a></li>
    <li><a id="nav-research"  onclick="navigate('research')" >Research</a></li>
    <li><a id="nav-assistant" onclick="navigate('assistant')">Assistant</a></li>
    <li><a id="nav-agents"    onclick="navigate('agents')"   >Agents</a></li>
    <li><a id="nav-api"       onclick="navigate('api')"      >API Docs</a></li>
    <li><a id="nav-sessions"  onclick="navigate('sessions')" >Sessions</a></li>
  </ul>

  <div class="nav-right">
    <div class="api-dot" id="api-pill">
      <span class="dot"></span>
      <span id="api-text">checking...</span>
    </div>
    <div class="nav-badge">ISIC QA v1.1</div>
  </div>
</nav>

<iframe id="page-frame" src="pages/home.html"></iframe>

<div id="toast">
  <div class="toast-title" id="toast-title">Notice</div>
  <div id="toast-body"></div>
</div>

<script>
const PAGES = {
  home     : 'pages/home.html',
  analyze  : 'pages/analyze.html',
  research : 'pages/research.html',
  assistant: 'pages/assistant.html',
  agents   : 'pages/agents.html',
  api      : 'pages/api.html',
  sessions : 'pages/sessions.html',
};

let currentPage = 'home';
const bar = document.getElementById('loading-bar');

function navigate(page) {
  
  currentPage = page;

  // Update nav active state
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById(`nav-${page}`);
  if (navEl) navEl.classList.add('active');

  // Loading bar animation
  bar.style.width = '30%';
  setTimeout(() => bar.style.width = '70%', 100);

  const frame = document.getElementById('page-frame');
  frame.onload = () => {
    bar.style.width = '100%';
    setTimeout(() => { bar.style.width = '0%'; }, 300);
  };
  frame.src = PAGES[page];
  document.title = `SkinAnalytica · ${page.charAt(0).toUpperCase()+page.slice(1)}`;
}

// ── API health check ──────────────────────────────────
async function checkApi() {
  const pill = document.getElementById('api-pill');
  const txt  = document.getElementById('api-text');
  try {
    const res  = await fetch((window.SA_CONFIG?.API_BASE || 'http://localhost:8001') + '/health',
                             { signal: AbortSignal.timeout(15000) });
    const data = await res.json();
    if (data.status === 'ok') {
      pill.className = 'api-dot live';
      txt.textContent= `v${data.version} live`;
      // Broadcast to iframes
      window.apiStatus = { live:true, version:data.version, model:data.model };
      return;
    }
  } catch {}
  pill.className = 'api-dot';
  txt.textContent= 'offline';
  window.apiStatus = { live:false };
}
checkApi();
setInterval(checkApi, 30000);

// ── Global toast (callable from iframes) ─────────────
window.showToast = function(title, body, duration=4000) {
  const t = document.getElementById('toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent  = body;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
};

// ── Allow iframes to navigate shell ──────────────────
window.shellNavigate = navigate;
</script>
</body>
</html>
